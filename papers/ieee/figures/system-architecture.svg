<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <style>
      .title { font: 700 34px 'Arial', sans-serif; fill: #16324f; }
      .subtitle { font: 600 22px 'Arial', sans-serif; fill: #16324f; }
      .body { font: 500 18px 'Arial', sans-serif; fill: #23384d; }
      .small { font: 500 16px 'Arial', sans-serif; fill: #3a5066; }
      .box { stroke: #29465b; stroke-width: 3; rx: 22; ry: 22; }
      .arrow { stroke: #29465b; stroke-width: 5; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#29465b"/>
    </marker>
  </defs>

  <rect width="1200" height="700" fill="#f7fafc"/>
  <text x="600" y="54" text-anchor="middle" class="title">SchEDU System Architecture</text>

  <rect x="60" y="120" width="310" height="420" class="box" fill="#e5f1fb"/>
  <text x="215" y="170" text-anchor="middle" class="subtitle">Mobile Client</text>
  <text x="92" y="225" class="body">• Expo Router navigation</text>
  <text x="92" y="265" class="body">• React Native teacher workflows</text>
  <text x="92" y="305" class="body">• Profile and institution screens</text>
  <text x="92" y="345" class="body">• Subject and lesson library</text>
  <text x="92" y="385" class="body">• Lesson-plan creation flow</text>
  <text x="92" y="425" class="body">• Monthly and daily calendar views</text>
  <text x="92" y="465" class="body">• Activity-generation forms</text>
  <text x="92" y="510" class="small">Runs on mobile devices and provides the</text>
  <text x="92" y="536" class="small">teacher-facing interface for planning tasks.</text>

  <rect x="445" y="120" width="310" height="420" class="box" fill="#e8f7ee"/>
  <text x="600" y="170" text-anchor="middle" class="subtitle">Supabase Backend</text>
  <text x="477" y="225" class="body">• Auth and session management</text>
  <text x="477" y="265" class="body">• PostgreSQL academic records</text>
  <text x="477" y="305" class="body">• Row-level security policies</text>
  <text x="477" y="345" class="body">• Storage for uploads and assets</text>
  <text x="477" y="385" class="body">• Edge Functions for utilities</text>
  <text x="477" y="425" class="body">• Persistent slots and blocks data</text>
  <text x="477" y="510" class="small">Stores structured content and schedule state,</text>
  <text x="477" y="536" class="small">and exposes cloud services to the client.</text>

  <rect x="830" y="120" width="310" height="420" class="box" fill="#fff3df"/>
  <text x="985" y="170" text-anchor="middle" class="subtitle">Scheduling and Utility Services</text>
  <text x="862" y="225" class="body">• Slot creation from meeting patterns</text>
  <text x="862" y="265" class="body">• Block generation from lessons and rules</text>
  <text x="862" y="305" class="body">• Term-aware placement and ordering</text>
  <text x="862" y="345" class="body">• Rebalance under suspension or delay</text>
  <text x="862" y="385" class="body">• PDF and image text extraction</text>
  <text x="862" y="425" class="body">• AI-assisted activity drafting</text>
  <text x="862" y="510" class="small">Transforms stored data into schedules and</text>
  <text x="862" y="536" class="small">support artifacts for teacher use.</text>

  <path d="M370 330 H445" class="arrow"/>
  <path d="M755 330 H830" class="arrow"/>

  <text x="407" y="314" text-anchor="middle" class="small">requests / updates</text>
  <text x="792" y="314" text-anchor="middle" class="small">data + services</text>

  <rect x="160" y="590" width="880" height="62" rx="18" ry="18" fill="#dfe8f0" stroke="#94a9bb" stroke-width="2"/>
  <text x="600" y="628" text-anchor="middle" class="body">Unified flow: teacher inputs academic content and planning constraints, backend persists state, scheduler and utilities generate maintainable outputs.</text>
</svg>
