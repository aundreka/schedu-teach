<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill: #17324d; }
      .head { font: 700 22px Arial, sans-serif; fill: #17324d; }
      .body { font: 500 17px Arial, sans-serif; fill: #28445d; }
      .small { font: 500 15px Arial, sans-serif; fill: #52687b; }
      .box { stroke: #34566f; stroke-width: 3; rx: 20; ry: 20; }
      .arrow { stroke: #34566f; stroke-width: 4; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#34566f"/>
    </marker>
  </defs>

  <rect width="1200" height="760" fill="#f9fbfd"/>
  <text x="600" y="52" text-anchor="middle" class="title">SchEDU System Context</text>

  <rect x="60" y="200" width="220" height="150" class="box" fill="#e8f3fb"/>
  <text x="170" y="245" text-anchor="middle" class="head">Teacher</text>
  <text x="92" y="285" class="body">• creates subjects</text>
  <text x="92" y="315" class="body">• generates lesson plans</text>
  <text x="92" y="345" class="body">• manages calendar blocks</text>

  <rect x="60" y="430" width="220" height="130" class="box" fill="#edf7ee"/>
  <text x="170" y="475" text-anchor="middle" class="head">Admin</text>
  <text x="92" y="515" class="body">• reviews dashboard</text>
  <text x="92" y="545" class="body">• monitors teachers and plans</text>

  <rect x="350" y="130" width="500" height="500" class="box" fill="#ffffff"/>
  <text x="600" y="175" text-anchor="middle" class="head">SchEDU Mobile Application</text>
  <text x="395" y="225" class="body">• authentication and profile flows</text>
  <text x="395" y="260" class="body">• institution and section management</text>
  <text x="395" y="295" class="body">• subject library and lesson editor</text>
  <text x="395" y="330" class="body">• lesson-plan creation and duplication</text>
  <text x="395" y="365" class="body">• monthly and daily calendar views</text>
  <text x="395" y="400" class="body">• manual block create, edit, delete</text>
  <text x="395" y="435" class="body">• curriculum upload and text extraction</text>
  <text x="395" y="470" class="body">• AI-assisted activity generation</text>
  <text x="395" y="525" class="small">Primary user interface implemented with Expo Router and React Native.</text>

  <rect x="920" y="150" width="230" height="180" class="box" fill="#fff4e5"/>
  <text x="1035" y="195" text-anchor="middle" class="head">Supabase Services</text>
  <text x="952" y="235" class="body">• Auth</text>
  <text x="952" y="265" class="body">• PostgreSQL database</text>
  <text x="952" y="295" class="body">• Storage</text>

  <rect x="920" y="390" width="230" height="170" class="box" fill="#f6ebf8"/>
  <text x="1035" y="435" text-anchor="middle" class="head">Edge and Utility Services</text>
  <text x="952" y="475" class="body">• extract-text function</text>
  <text x="952" y="505" class="body">• generate-activity function</text>
  <text x="952" y="535" class="body">• OCR and document processing</text>

  <path d="M280 275 H350" class="arrow"/>
  <path d="M280 495 H350" class="arrow"/>
  <path d="M850 250 H920" class="arrow"/>
  <path d="M850 485 H920" class="arrow"/>

  <rect x="220" y="665" width="760" height="58" rx="16" ry="16" fill="#dfe8f0" stroke="#9ab0c2" stroke-width="2"/>
  <text x="600" y="701" text-anchor="middle" class="body">The application acts as the central workspace that connects user actions, academic data, scheduling logic, and document utilities.</text>
</svg>
